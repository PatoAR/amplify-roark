version: 1

backend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm install -g aws-cdk@latest --force
        - npm install -g @aws-amplify/backend-cli@latest --force
        - (cd amplify && npm install)
    build:
      commands:
        - echo "Debug AWS_BRANCH=$AWS_BRANCH"
        - |
          if [ -z "$AWS_BRANCH" ]; then
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          else
            BRANCH_NAME=$AWS_BRANCH
          fi
        - npx ampx pipeline-deploy --branch $BRANCH_NAME --app-id $AWS_APP_ID

frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - amplify/node_modules/**/*
      - .npm/**/*